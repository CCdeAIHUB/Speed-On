name: Build Core Binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: speed-on-ipc-stdio.exe
          - os: macos
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact_name: speed-on-ipc-stdio
          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: speed-on-ipc-stdio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p speed-on-ipc-stdio

      - name: Rename binary (Windows)
        if: matrix.os == 'windows'
        run: |
          Copy-Item target/${{ matrix.target }}/release/speed-on-ipc-stdio.exe ${{ matrix.artifact_name }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows'
        run: |
          cp target/${{ matrix.target }}/release/speed-on-ipc-stdio ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: speed-on-ipc-stdio-${{ matrix.os }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/speed-on-ipc-stdio-windows/speed-on-ipc-stdio.exe
            artifacts/speed-on-ipc-stdio-macos/speed-on-ipc-stdio
            artifacts/speed-on-ipc-stdio-linux/speed-on-ipc-stdio
